# Nemesis Videos AI — Nginx für nemesis-video-ai.ch
# Platziere unter /etc/nginx/sites-available/ und symlink nach sites-enabled.
# TLS: certbot certonly --nginx -d nemesis-video-ai.ch -d www.nemesis-video-ai.ch -d comfy.nemesis-video-ai.ch

upstream nemesis_next {
    server 127.0.0.1:3040;
    keepalive 64;
}

upstream comfy_backend {
    server 127.0.0.1:8188;
    keepalive 8;
}

# HTTP → HTTPS (nach certbot anpassen)
server {
    listen 80;
    listen [::]:80;
    server_name nemesis-video-ai.ch www.nemesis-video-ai.ch comfy.nemesis-video-ai.ch;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nemesis-video-ai.ch www.nemesis-video-ai.ch;

    # ssl_certificate /etc/letsencrypt/live/nemesis-video-ai.ch/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nemesis-video-ai.ch/privkey.pem;

    client_max_body_size 512m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://nemesis_next;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name comfy.nemesis-video-ai.ch;

    # ssl_certificate /etc/letsencrypt/live/nemesis-video-ai.ch/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nemesis-video-ai.ch/privkey.pem;

    client_max_body_size 512m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (ComfyUI /ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        proxy_pass http://comfy_backend;
    }
}
