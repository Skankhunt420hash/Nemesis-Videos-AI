# Erste Einrichtung nur HTTP (Port 80). TLS: certbot --nginx ...
# Platzhalter __DOMAIN__ wird vom Script ersetzt.

upstream nemesis_next {
    server 127.0.0.1:3040;
    keepalive 64;
}

upstream comfy_backend {
    server 127.0.0.1:8188;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    client_max_body_size 512m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://nemesis_next;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name comfy.__DOMAIN__;

    client_max_body_size 512m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_pass http://comfy_backend;
    }
}
